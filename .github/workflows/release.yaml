name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write  # required for creating GH release and pushing branches
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: ${{ github.ref_name}}
        
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
        
    - name: Create release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # This is provided by GitHub automatically
        GORELEASER_CURRENT_TAG: ${{ github.ref_name }}
      id: goreleaser
      uses: goreleaser/goreleaser-action@v6
      with:
        distribution: goreleaser
        version: "~> v2"
        args: release --clean --verbose
        
    - name: Add charts to branch
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Extract version from tag (e.g., v1.0.8-rc2 -> 1.0.8-rc2)
        version=${GITHUB_REF_NAME#v}
        branch_version=v$(echo "$version" | cut -d'.' -f1,2)
        charts_branch=charts/$branch_version
        
        echo "Preparing to create/update branch: $charts_branch"
        
        # Set up Git identity
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        
        # Create mock chart directory and files for testing
        mkdir -p test-charts/eks-operator
        
        # Create a simple Chart.yaml file
        cat > test-charts/eks-operator/Chart.yaml <<EOF
apiVersion: v2
name: eks-operator
description: A Helm chart for the EKS Operator
type: application
version: $version
appVersion: $version
EOF
        
        # Create a simple values.yaml file
        cat > test-charts/eks-operator/values.yaml <<EOF
# Test values file
image:
  repository: your-docker-username/eks-operator
  tag: $GITHUB_REF_NAME
EOF
        
        echo "Test chart files created"
        
        # Create or switch to the charts branch
        if ! git ls-remote --exit-code --heads origin "$charts_branch"; then
          echo "Creating new branch: $charts_branch"
          git checkout --orphan "$charts_branch"
          git rm -rf .
          
          echo "# EKS Operator Helm Charts for $branch_version versions" > README.md
          echo "This is a test branch for verifying GitHub Actions workflow." >> README.md
          
          mkdir -p charts
          git add README.md
          git commit -m "Initial commit for $charts_branch"
        else
          echo "Switching to existing branch: $charts_branch"
          git checkout "$charts_branch"
        fi
        
        # Copy test charts to charts directory
        mkdir -p charts/eks-operator
        cp -r test-charts/eks-operator/* charts/eks-operator/
        
        # Add and commit changes
        git add charts/
        git commit -m "Update charts to version $version"
        
        # Push to the charts branch
        git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
        git push origin "$charts_branch"
        
        echo "Successfully pushed to $charts_branch branch"
